global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: tradeflow_api
    static_configs:
      - targets: ["api:8080"]
    metrics_path: /metrics

  - job_name: tradeflow_worker
    static_configs:
      - targets: ["worker:9091"]
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
