# Railway deployment config for TradeFlowGuardian.Dashboard
#
# In Railway dashboard, set this service's Root Directory to:
#   TradeFlowGuardian.Dashboard
#
# Required environment variables:
#   API_URL — public URL of the TradeFlowGuardian API service
#             e.g. https://your-api.railway.app

[build]
builder        = "DOCKERFILE"
dockerfilePath = "Dockerfile"
buildContext   = "."

[deploy]
healthcheckPath    = "/"
healthcheckTimeout = 30
restartPolicyType  = "ON_FAILURE"
restartPolicyMaxRetries = 3
