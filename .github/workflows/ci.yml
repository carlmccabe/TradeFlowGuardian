name: CI

on:
  pull_request:
    branches: [main, production]
  push:
    branches: [main, production]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Uncomment if any of the 55 tests hit real Redis/Postgres rather than
    # in-memory fakes. If all tests use mocks/FakeBrokerClient, leave commented.
    # services:
    #   postgres:
    #     image: postgres:16
    #     env:
    #       POSTGRES_PASSWORD: ci
    #       POSTGRES_DB: tfg_test
    #     ports: ['5432:5432']
    #     options: >-
    #       --health-cmd pg_isready --health-interval 5s
    #       --health-timeout 5s --health-retries 10
    #   redis:
    #     image: redis:7
    #     ports: ['6379:6379']
    #     options: >-
    #       --health-cmd "redis-cli ping" --health-interval 5s
    #       --health-timeout 5s --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=results.trx"
        # If tests need the service containers above, pass connection strings:
        # env:
        #   ConnectionStrings__Postgres: Host=localhost;Port=5432;Database=tfg_test;Username=postgres;Password=ci
        #   Redis__ConnectionString: localhost:6379

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/results.trx'
          retention-days: 7