# OPTION B ONLY — skip this file entirely if using Railway pre-deploy commands (recommended).
#
# Runs migrations from GitHub Actions after CI passes, targeting the right DB per branch.
# Requires repo secrets:
#   DATABASE_URL_STAGING — Railway staging Postgres PUBLIC proxy URL
#   DATABASE_URL_PROD    — Railway prod Postgres PUBLIC proxy URL
# (Railway internal hostnames like postgres.railway.internal are NOT reachable from GitHub —
#  use the public TCP proxy connection string from the Railway Postgres service settings.)

name: Migrate

on:
  push:
    branches: [main, production]

concurrency:
  group: migrate-${{ github.ref }}
  cancel-in-progress: false   # never cancel a running migration

jobs:
  migrate:
    name: Apply migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Select target database
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "production" ]; then
            echo "env_name=production" >> "$GITHUB_OUTPUT"
          else
            echo "env_name=staging" >> "$GITHUB_OUTPUT"
          fi

      # --- Variant 1: EF Core migrations bundle ---
      # - name: Build migrations bundle
      #   run: |
      #     dotnet tool install --global dotnet-ef
      #     dotnet ef migrations bundle \
      #       --project src/TradeFlowGuardian.Infrastructure \
      #       --startup-project src/TradeFlowGuardian.Api \
      #       --output ./efbundle --force
      # - name: Apply
      #   run: ./efbundle --connection "${{ steps.target.outputs.env_name == 'production' && secrets.DATABASE_URL_PROD || secrets.DATABASE_URL_STAGING }}"

      # --- Variant 2: custom runner / DbUp-style entry point ---
      # Adjust project path and flag to the actual migration entry point.
      - name: Apply migrations
        env:
          DATABASE_URL: ${{ steps.target.outputs.env_name == 'production' && secrets.DATABASE_URL_PROD || secrets.DATABASE_URL_STAGING }}
        run: |
          dotnet run --project src/TradeFlowGuardian.Api -- --migrate-only
